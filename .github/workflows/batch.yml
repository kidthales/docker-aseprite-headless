name: Batch

on:
  workflow_dispatch: ~
  schedule:
    # UTC
    - cron: 20 4 * * *

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  batch-build-and-push:
    strategy:
      fail-fast: false
      matrix:
        aseprite-git-ref: [main, v1.3.15.5, v1.3.16, v1.3.16.1, v1.3.17, v1.3.17.1]
    uses: ./.github/workflows/base.yml
    with:
      aseprite-git-ref: ${{ matrix.aseprite-git-ref }}
    secrets:
      ghcr-token: ${{ secrets.GITHUB_TOKEN }}

name: Clean

on:
  workflow_dispatch: ~
  schedule:
    # UTC
    - cron: 20 16 * * *

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
  
jobs:
  ghcr-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: aseprite
          delete-untagged: true
